<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid-container{
            display: grid;
            grid-template-columns: 50px 50px 50px 50px 50px;
            grid-template-rows: 50px 50px 50px 50px;
            gap: 5px;
        }
        #header,#footer{
            grid-column-start: 1;
            grid-column-end: 6;
        }
        #side{
            grid-row-start: 2;
            grid-row-end: 4;
        }
        #c1{
            grid-column-start: 2;
            grid-column-end: 6;
        }
        #c2{
            grid-column-start: 2;
            grid-column-end: 4;
        }
        #c3{
            grid-column-start: 4;
            grid-column-end: 6;
        }
  
        .grid-container .box{
            border:1px solid rgb(246, 53, 53)
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="box" id="header">Header</div>
        <div class="box" id="side">sidebar</div>
        <div class="box" id="c1">content 1</div>
        <div class="box" id="c2">content 2</div>
        <div class="box" id="c3">content 3</div>
        <div class="box" id="footer">footer</div>
    </div>
    
</body>
</html>
