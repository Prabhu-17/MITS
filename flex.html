<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            height: 100vh;
            justify-content: space-between;
            align-items: center;
        }
        .container .box{
            background-color: aqua;
            border: 2px solid blue;
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <h1>FLEXBOX</h1>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>
</body>
</html>
